<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TFL Play Focus View MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" data-play-focus-view>
      <header class="scoreboard" aria-label="Scoreboard">
        <section class="team home">
          <span data-home-name></span>
          <strong data-home-score></strong>
        </section>
        <section class="match-center">
          <span class="status" data-status></span>
          <strong><span data-clock></span></strong>
          <span data-phase></span>
        </section>
        <section class="team away">
          <strong data-away-score></strong>
          <span data-away-name></span>
        </section>
      </header>

      <section class="scene-grid">
        <section class="focus-board" aria-label="Play Focus View">
          <div class="event-strip" data-event-nav></div>

          <div class="pitch-card">
            <div class="pitch-header">
              <span data-event-type></span>
              <strong data-route></strong>
            </div>
            <div class="pitch" data-pitch>
              <div class="half-line"></div>
              <div class="center-circle"></div>
              <div class="box left"></div>
              <div class="box right"></div>
              <div class="goal left"></div>
              <div class="goal right"></div>
              <div class="pitch-overlay" data-pitch-overlay></div>
            </div>
          </div>

          <section class="focus-details" aria-label="Current event details">
            <div data-actor-panel></div>
            <div data-target-panel></div>
            <div class="supporters" data-supporters-panel></div>
          </section>
        </section>

        <aside class="side-panel" aria-label="Broadcast and stats">
          <section class="broadcast-panel">
            <div class="panel-title">
              <span>Broadcast</span>
              <strong data-stat-effect></strong>
            </div>
            <p class="lead-commentary" data-commentary-lead></p>
            <ul class="commentary-list" data-commentary></ul>
          </section>

          <section class="stats-panel">
            <div class="panel-title">
              <span>Match Stats</span>
              <strong data-ball-path></strong>
            </div>
            <ul class="stat-list" data-stats></ul>
          </section>
        </aside>
      </section>

      <section class="bottom-grid">
        <section class="timeline-panel" aria-label="Event timeline">
          <div class="panel-title">
            <span>Timeline</span>
            <strong>Pitch scenes and flow labels</strong>
          </div>
          <div class="timeline-list" data-timeline></div>
        </section>

        <section class="controls" aria-label="Playback controls">
          <button type="button" data-prev>Prev</button>
          <button type="button" data-play>Play</button>
          <button type="button" data-next>Next</button>
          <button type="button" data-replay>Replay</button>
          <label>
            Speed
            <select data-speed>
              <option value="3400">Slow</option>
              <option value="2600" selected>Normal</option>
              <option value="1500">Fast</option>
            </select>
          </label>
        </section>
      </section>
    </main>

    <script src="./sample-events.js"></script>
    <script src="./play-focus-view.js"></script>
  </body>
</html>
