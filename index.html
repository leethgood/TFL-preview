<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TFL LIVE 경기 화면 MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" data-play-focus-view>
      <header class="live-header" aria-label="LIVE 경기 점수판">
        <section class="team home">
          <span data-home-name></span>
          <strong data-home-score></strong>
        </section>
        <section class="match-center">
          <span class="status" data-status></span>
          <strong data-clock></strong>
          <span data-phase></span>
        </section>
        <section class="team away">
          <strong data-away-score></strong>
          <span data-away-name></span>
        </section>
      </header>

      <section class="live-event-card" aria-label="현재 경기 장면">
        <div class="event-copy">
          <span class="eyebrow">현재 이벤트</span>
          <h1 data-current-event-type></h1>
          <p data-current-event-label></p>
        </div>
        <div class="watch-card">
          <span>이번 장면에서 볼 것</span>
          <strong data-watch-point></strong>
          <small>
            이벤트 6종이 공 이동 / 핵심 선수 / 중계 / 타임라인으로
            어떻게 보이는지 확인합니다.
          </small>
        </div>
        <div class="playback-controls" aria-label="재생 컨트롤">
          <button type="button" data-play>일시정지</button>
          <button type="button" data-replay>처음부터</button>
          <label>
            속도
            <select data-speed>
              <option value="3600">느리게</option>
              <option value="2600" selected>보통</option>
              <option value="1500">빠르게</option>
            </select>
          </label>
        </div>
      </section>

      <section class="live-grid">
        <section class="pitch-zone" aria-label="Play Focus View 경기장">
          <div class="pitch-card">
            <div class="pitch-header">
              <span>Play Focus View</span>
              <strong data-route></strong>
            </div>
            <div class="pitch" data-pitch>
              <div class="half-line"></div>
              <div class="center-circle"></div>
              <div class="box left"></div>
              <div class="box right"></div>
              <div class="goal left"></div>
              <div class="goal right"></div>
              <div class="pitch-overlay" data-pitch-overlay></div>
            </div>
          </div>

          <section class="focus-details" aria-label="핵심 선수와 대상">
            <div data-actor-panel></div>
            <div data-target-panel></div>
            <div class="supporters" data-supporters-panel></div>
          </section>
        </section>

        <aside class="live-rail" aria-label="현재 장면 설명과 중계">
          <section class="scene-brief">
            <div class="panel-title">
              <span>현재 장면 설명</span>
              <strong data-sequence-position></strong>
            </div>
            <p data-current-description></p>
          </section>

          <section class="broadcast-panel">
            <div class="panel-title">
              <span>텍스트 중계</span>
              <strong data-stat-effect></strong>
            </div>
            <ul class="commentary-list" data-commentary></ul>
          </section>

          <section class="stats-panel">
            <div class="panel-title">
              <span>간단 기록</span>
              <strong data-ball-path></strong>
            </div>
            <ul class="stat-list" data-stats></ul>
          </section>
        </aside>
      </section>

      <section class="timeline-panel" aria-label="이벤트 타임라인">
        <div class="panel-title">
          <span>이벤트 타임라인</span>
          <strong>자동 경기 시퀀스</strong>
        </div>
        <div class="timeline-list" data-timeline></div>
      </section>

      <details class="debug-panel">
        <summary>개발용 장면 직접 점검</summary>
        <div class="event-strip" data-event-nav></div>
      </details>
    </main>

    <script src="./sample-events.js"></script>
    <script src="./play-focus-view.js"></script>
  </body>
</html>
